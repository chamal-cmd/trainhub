[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Give the AI chat function 30 seconds (free tier max)
[functions]
  included_files = ["src/app/api/ai-chat/**"]

[[functions]]
  path = "/api/ai-chat"
  timeout = 30
